<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Meal tracker</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="meal_tracker.css" />
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function getTotals(foods) {
  return foods.reduce(
    (totals, food) => ({
      calories: totals.calories + food.calories,
      protein: totals.protein + food.protein,
      carbs: totals.carbs + food.carbs,
      fat: totals.fat + food.fat,
    }),
    { calories: 0, protein: 0, carbs: 0, fat: 0 }
  );
}

const icons = {
  breakfast: "🍳",
  lunch: "🍴",
  dinner: "🍽️",
  snack: "🍎",
};

function formatTime(time) {
  return new Date(time).toLocaleTimeString([], {
    hour: "numeric",
    minute: "2-digit",
  });
}

function MacroPill({ label, grams }) {
  return (
    <span className="tag_box">
      {label}: {Math.round(grams)}g
    </span>
  );
}

function AddFoodForm({ onSubmit, onCancel }) {
  const [name, setName] = useState("");
  const [calories, setCalories] = useState("");
  const [protein, setProtein] = useState("");
  const [carbs, setCarbs] = useState("");
  const [fat, setFat] = useState("");

  const isValid = name.trim().length > 0 && Number(calories) > 0;

  function saveFood(e) {
    e.preventDefault();
    if (!isValid) return;
    onSubmit({
      name: name.trim(),
      calories: Number(calories) || 0,
      protein: Number(protein) || 0,
      carbs: Number(carbs) || 0,
      fat: Number(fat) || 0,
    });
  }

  return (
    <form onSubmit={saveFood} className="food_form">
      <input
        autoFocus
        type="text"
        placeholder="Food name"
        value={name}
        onChange={(e) => setName(e.target.value)}
        className="food_input"
      />
      <div className="macro_inputs">
        <input type="number" min="0" placeholder="Cal" value={calories}
          onChange={(e) => setCalories(e.target.value)}
          className="macro_box" />
        <input type="number" min="0" placeholder="P (g)" value={protein}
          onChange={(e) => setProtein(e.target.value)}
          className="macro_box" />
        <input type="number" min="0" placeholder="C (g)" value={carbs}
          onChange={(e) => setCarbs(e.target.value)}
          className="macro_box" />
        <input type="number" min="0" placeholder="F (g)" value={fat}
          onChange={(e) => setFat(e.target.value)}
          className="macro_box" />
      </div>
      <div className="button_container">
        <button type="submit" disabled={!isValid} className="main_button save_button">
          Save
        </button>
        <button type="button" onClick={onCancel} className="main_button cancel_button">
          Cancel
        </button>
      </div>
    </form>
  );
}

function MealCard({ meal }) {
  const [foods, setFoods] = useState(meal.foods);
  const [addingFood, setAddingFood] = useState(false);
  const totals = getTotals(foods);

  function addFood(newFood) {
    setFoods((prev) => [...prev, { ...newFood, id: crypto.randomUUID() }]);
    setAddingFood(false);
  }

  return (
    <div className="meal_box">
      <div className="meal_top">
        <div className="meal_left">
          <div className="meal_icon">
            <span aria-hidden="true">{icons[meal.type]}</span>
          </div>
          <div>
            <h2 className="meal_name">{meal.type.charAt(0).toUpperCase() + meal.type.slice(1)}</h2>
            <p className="meal_time">{formatTime(meal.time)}</p>
          </div>
        </div>
        <div>
          <p className="calories_number">{Math.round(totals.calories)}</p>
          <p className="calories_text">Cal</p>
        </div>
      </div>

      <ul className="food_items">
        {foods.map((food) => (
          <li key={food.id} className="food_row">
            <span className="food_circle" aria-hidden="true" />
            <span>{food.name}</span>
          </li>
        ))}
      </ul>

      <hr className="line_break" />

      <div className="tag_container">
        <MacroPill label="P" grams={totals.protein} />
        <MacroPill label="C" grams={totals.carbs} />
        <MacroPill label="F" grams={totals.fat} />
      </div>

      {addingFood ? (
        <AddFoodForm onSubmit={addFood} onCancel={() => setAddingFood(false)} />
      ) : (
        <button type="button" onClick={() => setAddingFood(true)} className="add_food_button">
          <span style={{ fontSize: "18px", lineHeight: 1 }}>+</span> Add food
        </button>
      )}
    </div>
  );
}

const meal = {
  id: "meal-1",
  type: "lunch",
  time: new Date().toISOString(),
  foods: [
    { id: "f1", name: "Grilled chicken", calories: 280, protein: 32, carbs: 0, fat: 8 },
    { id: "f2", name: "Brown rice", calories: 220, protein: 5, carbs: 45, fat: 2 },
    { id: "f3", name: "Steamed broccoli", calories: 55, protein: 4, carbs: 11, fat: 1 },
    { id: "f4", name: "Sweet potato", calories: 125, protein: 2, carbs: 29, fat: 0.2 },
  ],
};

function App() {
  return <MealCard meal={meal} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
